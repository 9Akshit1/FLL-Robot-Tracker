<!-- frontend/templates/dashboard.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLL Robot Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .config-section {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .config-item {
            background: white;
            padding: 15px;
            border-radius: 3px;
            border: 1px solid #ddd;
        }
        .config-item label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .config-item select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 12px;
        }
        .button-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .button-row .btn {
            flex: 1;
            min-width: 100px;
            padding: 8px 12px;
            font-size: 12px;
        }
        .terminal {
            background: #1e1e1e;
            color: #0f0;
            padding: 12px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            height: 150px;
            overflow-y: auto;
            border: 1px solid #333;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 10px 0;
        }
        .code-preview {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 3px;
            border: 1px solid #ddd;
            height: 150px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 10px;
        }
        .code-preview pre {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>FLL Robot Tracker</h1>
        
        <div id="status" class="status-box">Configure your robot first</div>

        <!-- COM PORT SECTION -->
        <div class="section config-section">
            <h2>Serial Connection</h2>
            <div class="config-grid">
                <div class="config-item">
                    <label>Select COM Port</label>
                    <select id="comPort">
                        <option value="">Loading ports...</option>
                    </select>
                </div>
            </div>
            <button id="detectPortsBtn" class="btn" style="flex: 0 1 auto; min-width: 120px;">Detect Ports</button>
            <div id="portStatus"></div>
        </div>

        <!-- CONFIG SECTION -->
        <div class="section config-section">
            <h2>Robot Configuration</h2>
            <div id="configGrid" class="config-grid"></div>

            <div class="button-row">
                <button id="saveConfigBtn" class="btn" style="flex: 0 1 auto; min-width: 150px;">Save & Upload Config</button>
            </div>
            <div id="configStatus"></div>
        </div>

        <!-- MAIN WORKFLOW -->
        <div class="section">
            <h2>Workflow</h2>
            <div class="button-row">
                <button id="connectBtn" class="btn">1. Connect & Record</button>
                <button id="pullBtn" class="btn" disabled>2. Pull Data</button>
                <button id="analyzeBtn" class="btn" disabled>3. Analyze</button>
                <button id="visualizeBtn" class="btn" disabled>Visualize</button>
            </div>
            <div class="button-row">
                <button id="convertBtn" class="btn" disabled>4. Generate</button>
                <button id="uploadBtn" class="btn" disabled>5. Upload</button>
                <button id="runBtn" class="btn" disabled>6. Run</button>
                <button id="downloadBtn" class="btn" disabled>Download</button>
            </div>
        </div>

        <!-- TERMINAL -->
        <div class="section">
            <h2>Output</h2>
            <div id="terminal" class="terminal">Configure robot first...</div>
        </div>

        <!-- VISUALIZATION -->
        <div class="section">
            <h2>Path Visualization</h2>
            <canvas id="pathCanvas" width="800" height="400" style="border: 1px solid #ddd; border-radius: 3px; background: white; display: block; margin: 0 auto;"></canvas>
        </div>

        <!-- CODE PREVIEW -->
        <div class="section">
            <h2>Generated Script</h2>
            <div id="codePreview" class="code-preview"><pre>Script will appear here...</pre></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
